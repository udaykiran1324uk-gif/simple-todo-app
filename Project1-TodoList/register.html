<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - To-Do List Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5">
                <div class="card p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <h1 class="title-3d mb-2">To-Do List</h1>
                            <p class="text-muted fw-bold">Application</p>
                        </div>
                        
                        <form id="registerForm">
                            <div class="mb-4">
                                <label for="displayName" class="form-label fw-bold text-muted small">USERNAME (FOR DISPLAY)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                    <input type="text" class="form-control" id="displayName" placeholder="e.g. John Doe" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="mobileNumber" class="form-label fw-bold text-muted small">MOBILE NUMBER (FOR RECOVERY)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control" id="mobileNumber" placeholder="10-digit number" pattern="[0-9]{10}" required title="Please enter a valid 10-digit mobile number">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="userIdentifier" class="form-label fw-bold text-muted small">USERNAME OR EMAIL (FOR SIGN IN)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope-at"></i></span>
                                    <input type="text" class="form-control" id="userIdentifier" placeholder="johndoe@example.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-muted small">SECURE PASSWORD</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="Enter your Password" required>
                                    <span class="input-group-text bg-transparent" id="togglePassword" style="cursor:pointer">
                                        <i class="bi bi-eye" id="eyeIcon"></i>
                                    </span>
                                </div>
                                <div class="password-requirements mt-3" id="requirements">
                                    <div class="requirement-item small mb-1" id="length"><i class="bi bi-circle me-1"></i> 8+ Characters</div>
                                    <div class="requirement-item small mb-1" id="uppercase"><i class="bi bi-circle me-1"></i> Uppercase Letter</div>
                                    <div class="requirement-item small mb-1" id="number"><i class="bi bi-circle me-1"></i> Number</div>
                                    <div class="requirement-item small mb-1" id="special"><i class="bi bi-circle me-1"></i> Special (!@#$%^&*)</div>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 py-3 mt-2">CREATE ACCOUNT</button>
                        </form>
                        
                        <div class="text-center mt-4 pt-3">
                            <p class="text-muted small">Already a member? <a href="login.html" class="text-primary text-decoration-none fw-bold">SIGN IN</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const userIdentifier = document.getElementById('userIdentifier');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });

        const requirements = {
            length: val => val.length >= 8,
            uppercase: val => /[A-Z]/.test(val),
            number: val => /[0-9]/.test(val),
            special: val => /[!@#$%^&*]/.test(val)
        };

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            Object.keys(requirements).forEach(req => {
                const isValid = requirements[req](val);
                const el = document.getElementById(req);
                const icon = el.querySelector('i');
                if (isValid) {
                    el.classList.add('text-success');
                    icon.classList.replace('bi-circle', 'bi-check-circle-fill');
                } else {
                    el.classList.remove('text-success');
                    icon.classList.replace('bi-check-circle-fill', 'bi-circle');
                }
            });
        });

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const identifier = userIdentifier.value.trim().toLowerCase();
            const password = passwordInput.value;
            const displayName = document.getElementById('displayName').value.trim();
            const mobile = document.getElementById('mobileNumber').value.trim();

            if (!displayName) {
                alert('Please enter a display username.');
                return;
            }

            if (!/^\d{10}$/.test(mobile)) {
                alert('Please enter a valid 10-digit mobile number.');
                return;
            }

            const allValid = Object.keys(requirements).every(req => requirements[req](password));
            if (!allValid) {
                alert('Password does not meet 3D security standards.');
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => (u.identifier || '').trim().toLowerCase() === identifier)) {
                alert('Account already exists!');
                return;
            }
            
            users.push({ identifier, password, displayName, mobile });
            localStorage.setItem('users', JSON.stringify(users));
            alert('Welcome to the Application!');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
